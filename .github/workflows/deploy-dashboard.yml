name: Deploy YouTube dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'yt-dashboard/**'
      - 'data/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish yt-dashboard/ to the gh-pages branch
        run: |
          # bundle recorded data into the published site so the dashboard reads it
          # from its own origin (data/), independent of any source-branch name
          cp -r data yt-dashboard/data 2>/dev/null || true
          cd yt-dashboard
          rm -f publish.sh
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy dashboard from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
