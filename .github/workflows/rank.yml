name: Weekly search rank check

on:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

# shared with the snapshot workflow so the two never push to the same branch at once
concurrency:
  group: data-push

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check search ranks
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: node scripts/rank.mjs
      - name: Commit ranks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Search rank check"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            echo "push attempt $i failed, retrying"; sleep $((i * 3))
          done
          echo "::error::rank push failed after retries"; exit 1
