name: Hourly stats snapshot

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# shared with the rank workflow so the two never push to the same branch at once
concurrency:
  group: data-push

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snapshot public stats
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          BENCH_CHANNELS: ${{ secrets.BENCH_CHANNELS }}
        run: node scripts/snapshot.mjs
      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Stats snapshot"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            echo "push attempt $i failed, retrying"; sleep $((i * 3))
          done
          echo "::error::snapshot push failed after retries"; exit 1
      - name: Raise milestone issue
        if: ${{ hashFiles('new-alerts.txt') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "📈 Channel milestone — $(date -u +%d\ %b)" --body "$(cat new-alerts.txt)" || echo "::warning::gh issue create failed — milestone issue not raised"
