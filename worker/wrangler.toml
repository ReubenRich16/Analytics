# Cloudflare Worker config for the per-minute offline tracker.
# Deploy steps are in ../README.md ("Per-minute offline tracker").

name = "yt-minute-tracker"
main = "worker.js"
compatibility_date = "2024-11-01"

# Runs the tracker every minute. Cloudflare's free plan allows cron triggers.
[triggers]
crons = ["* * * * *"]

# A KV namespace stores the recorded minute samples. After you create one with
#   npx wrangler kv namespace create MINUTE
# paste the printed id below (replacing PUT_YOUR_KV_NAMESPACE_ID_HERE).
[[kv_namespaces]]
binding = "MINUTE"
id = "PUT_YOUR_KV_NAMESPACE_ID_HERE"

# Secrets (set with the commands below, never in this file or git):
#   npx wrangler secret put YT_API_KEY    # public YouTube key (per-minute tracker)
#   npx wrangler secret put CHANNEL_ID    # UCyours,UCpartners (tracked + AI-allowed channels)
#   npx wrangler secret put GEMINI_KEY    # OPTIONAL — enables the owner-locked Idea Studio AI
# GEMINI_KEY is only needed if you want the Worker to power the AI ideas. When set, the
# Worker answers /ai only for a signed-in YouTube account listed in CHANNEL_ID, so the key
# stays secret and only you and your partner can use it.
